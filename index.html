<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小猪迷宫大冒险</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: 'Arial', sans-serif; overflow: hidden; }
        .game-container { text-align: center; background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { color: #ff6b9d; margin-bottom: 10px; font-size: 28px; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 15px; font-weight: bold; color: #4a5568; }
        canvas { border: 4px solid #ff6b9d; border-radius: 10px; background: #2d3748; display: block; margin: 0 auto; }
        .victory-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; flex-direction: column; z-index: 1000; color: white; }
        .btn { background: linear-gradient(45deg, #ff6b9d, #ff8e53); color: white; border: none; padding: 15px 40px; font-size: 18px; border-radius: 30px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐷 小猪迷宫大冒险 🍍</h1>
        <div class="stats">
            <div>关卡: <span id="currentLevel">1</span> / 5</div>
            <div>用时: <span id="timer">0</span>s</div>
        </div>
        <canvas id="gameCanvas" width="600" height="600"></canvas>
    </div>
    <div class="victory-overlay" id="victoryOverlay">
        <h2>🎉 全关卡达成！🎉</h2>
        <p>总用时：<span id="finalTime">0</span> 秒</p>
        <button class="btn" onclick="location.reload()">重新挑战</button>
    </div>
    <script>
        // 这里放入之前提供给你的所有 JavaScript 逻辑
        // (为了回复简洁，请确保将原有的 <script> 标签内的逻辑完整粘贴在此处)
    </script>
</body>
</html>
